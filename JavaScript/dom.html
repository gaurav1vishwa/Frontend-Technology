<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model</title>
</head>
<body>
<h1 id="h1" > Document Object Model (DOM) </h1>
<h2>Welcome</h2>
<p> getElementsByTagName</p>
<p> getElementById </p>
<p> getElementsByClassName </p>
<p>getElementsByName</p>
<h5>hello</h5>
<h5>Thankyou</h5>


<input type="text" placeholder="Enter your hero's name" name="hero">
<p id="p">Value displayed here</p>
<button onclick="clickme()">click me</button>




<script>
    document.getElementsByTagName("p")[1].style.color = "red";


function clickme() {

    let hero = document.getElementsByName("hero")[0].value;
    document.getElementById("p").innerText=hero;
   let list = document.getElementsByTagName("p");
   for(let i =0; i<=list.length; i++) {
     list[i].style.backgroundColor="aqua";
     list[i].style.color="black";
   }
}

document.getElementById("h1").style.backgroundColor="green";
document.querySelector("h2").innerText="hey how are you";
document.querySelector("h2").textContent="hello how are you";
document.querySelector("h2").innerHTML="<h4><i>hey i am a h4 tag </i> </h4>";
document.getElementsByTagName("h4")[0].style.color="pink";

let e = document.querySelectorAll("h5");
e.forEach((b)=>{
    b.style.color="green";
})


</script>
</body>
</html>
