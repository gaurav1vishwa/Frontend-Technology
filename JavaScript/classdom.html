<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add and remove</title>

    <style>
    

        div {
            width: 200px;
            height: 300px;
            border: 1px solid black;
            background-color: rgb(12, 165, 114);
            color: red; 
            text-align: center;
            display: flex;
        }

        p {
            font-weight: 800;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: purple;
            text-shadow: aquamarine;
        }
    </style>
</head>

<body>
    <h1>DOM Manipulation</h1>

    <button onclick="addBox()"> add box</button>
    <button onclick="removeBox()">remove button</button>


    <button onclick="addNotes()">add notes</button>
    <button onclick="removeNotes()">remove notes</button>


    <script>
    function addBox() {
         a = document.querySelector("body");
        newdiv = document.createElement("div");
       a.appendChild(newdiv);

    
    }

       function removeBox() {
       let a = document.querySelector("body");
       let remove = document.querySelector("div");
       a.removeChild(remove);
    
    }


    function addNotes() {

        let a = document.querySelector("body");
        let div = document.createElement("div");
        let p = document.createElement("p");
        p.textContent="hey how are you...";
        let b = div.appendChild(p);
        a.appendChild(div);
    }

    function removeNotes() {
         let a = document.querySelector("body");
       let remove = document.querySelector("div");
       a.removeChild(remove);

    }
    </script>
</body>
</html>
