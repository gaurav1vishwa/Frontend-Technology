<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Validation</title>
</head>
<body>
    <h1>Name Validation</h1>
    <form action="">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required pattern="^([A-Z]{1,1})[a-z]{2,100}$"
         placeholder="Enter your name..." title="name must be first latter capital and should be greater than 1 and less than 11">
        <br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
