<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraphs</title>
</head>
<body>
<!--case1-->
    <p>Hello, how are you?</p>
    <p>I hope you are fine, thank you!</p>
    <!--case2-->
    <p>Hello, how are you?</p> <p>I hope you are fine,           thank you!</p>
    
    <p>Hello, <br>I hope you are fine, thank you!</p> 
    <!--br tag is used to break the line, but it does not create a new paragraph. It is an inline element,
    while p tag is a block-level element that creates a new paragraph. Therefore, the text after the br tag will be on the same line as the text before it, while the text in the second p tag will be on a new line. -->

<!--preformatted text-->
    <pre>
 hello ,           h    o    w  a   r   e     y   o   u  ?
    </pre>

</body>
</html>
