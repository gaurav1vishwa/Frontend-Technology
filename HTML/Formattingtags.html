<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p><b>Bold text</b> This is a paragraph.</p>
    <p><i>Italic text</i> This is another paragraph.</p>
    <p><u>Underline text</u> This is a third paragraph.</p> 
    
    <p><big>Big text</big>      normal text</p>
    <p><strong>Strong text</strong></p>
    <P><MARK>Marked text</MARK></P> <!--DEFAULT YEELOW BACKGROUND -->
    <P>H <sub>2</sub>O</P>
    <p>a <sup>2</sup> + b <sup>2</sup> = c <sup>2</sup></p>
    <p><i>office price</i> is $100 instead of <strike>$200</strike></p>

    <p><b>Important notes</b></p>
    <p><em> hey how are you </em></p>



</body>
</html>
