<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block_Elements and Inline_Elements</title>
</head>
<body>
    <!-- div tag is considered as a block-level element that why it starts on a new line  and take the full width of the browser -->
    <div>hello</div>
    <div>hi</div>
    <!-- div,h1-h6, p are also block-level elements -->


    <!-- inline elements -->
    <span>hello</span>
    <span>hi</span>
<!-- span, a, img,sub, sup, a, i, b and many more are inline elements , it only takes the width of the content -->
 <p>water = H<sub style="color: red;">2</sub>O <i>where</i> <span style="color: pink;">h means hydrogen</span> and <b><span style="color: blue;">o means oxygen</span></b></p>
 <br>
 
</body>
</html>
