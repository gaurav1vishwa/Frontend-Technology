<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p contenteditable="false" style="background-color: red; text-decoration: underline; color: white;">Hello Everyone how are you?</p> 
    <!-- contenteditable is an attribute that allows the content of an element to be editable by the user. When this attribute is set to "true", the user can click on the element and edit its content directly in the browser. In this example, the paragraph element with the text "Hello Everyone how are you?" can be edited by the user because it has the contenteditable attribute set to "true". -->
</body>
</html>
