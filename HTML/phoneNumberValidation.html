<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone No.</title>
</head>
<body>
    <h1>Phone Number Validation</h1>
    <form action="">
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone"  pattern="^\d{10}$" placeholder="Enter your phone number..." title="Please enter a valid 10-digit phone number">
        <br><br>

          <label for="phone">Indian Phone Number:</label>
        <input type="tel" id="phone" name="phone"  pattern="^+91 [6-9]{1}[0-9]{2}-[0-9]{3}-[0-9]{3}$" placeholder="Enter your phone number..." title="Please enter a valid 10-digit phone number">
        <br><br>

        <input type="submit" value="Submit"> &nbsp; &nbsp;
        <button type="reset">Reset</button>
        
    </form>
</body>
</html>
