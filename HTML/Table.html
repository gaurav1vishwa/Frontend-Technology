<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>

<body>
    <table border="1" style="width: 30%; height: 30%; font-size: large;">
        <caption style="caption-side: bottom; text-align: right; font-weight: bolder;">Employee Details</caption>
        <tr>
            <th>
                S NO.
            </th>
            <th>
                Name
            </th>
            <th>
                Age
            </th>

        </tr>
        <tr>
            <td>1</td>
            <td>John Doe</td>
            <td>25</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Jane Smith</td>
            <td>30</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Bob Johnson</td>
            <td>35</td>
        </tr>
    </table>

    <table border="1" style="width: 50%;">
        <tr>
            <td colspan="3">1</td>
        <tr>
            <td rowspan="2">4</td>
            <td>5</td>
            <td rowspan="2">6</td>
        </tr>
        <tr>
            <td>8
            </td>
           
        </tr>
          <tr>
            <td colspan="3">10</td>
            
        </tr>
    </table>
</body>

</html>
