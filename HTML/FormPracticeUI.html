<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <form action="">
    <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" placeholder="10 digit number"><br><br>

        <label for="website">Website:</label>
        <input type="url" id="website" name="website" placeholder="https://example.com"><br><br>

        <label for="course">Search Course:</label>
        <input type="search" id="course" name="course" placeholder="Search..."><br><br>
    </fieldset>

    <fieldset>
        <legend>Other Details</legend>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="1" max="100"><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br><br>

        <label for="time">Preferred Time:</label>
        <input type="time" id="time" name="time"><br><br>

        <label for="datetime">Meeting Date & Time:</label>
        <input type="datetime-local" id="datetime" name="datetime"><br><br>

        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>

        <input type="checkbox" id="hobbies" name="hobbies">
        <label for="hobbies">Hobbies</label>
           <input type="checkbox" id="reading" name="reading">
        <label for="reading">Reading</label>
           <input type="checkbox" id="sport" name="sport">
        <label for="sport">Sports</label><br><br>

        <label for="color">Favorite Color:</label>
        <input type="color" id="color" name="color"><br><br>

        <label for="range">Skill Level:</label>
        <input type="range" id="range" name="range" min="0" max="10" value="5"><br><br>
    </fieldset>
     
    <fieldset>
        <legend>Selection</legend>
        <label for="course">Course:</label><br>
        <select name="course" id="course">
            <option value="html"><H1>HTML</H1></option>
            <option value="css"><H1>CSS</H1></option>
            <option value="js"><H1>JS</H1></option>
        </select><br><br>

        <label for="city">City:</label>
        <input type="text" id="city" name="city"><br><br>

        <label for="photo">Upload Photo:</label>
        <input type="file" id="photo" name="photo"><br><br>
    </fieldset>

        <fieldset>
            <legend for="comment">Comments</legend>
            <textarea name="comment" id="comment" placeholder="Write your comments here..."></textarea>
            <br><br>
        </fieldset>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset"> 
        <button type="button" disabled>Disabled Button</button>
    </form>
</body>
</html>
