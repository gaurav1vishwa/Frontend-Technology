<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Form</title>
</head>

<body>
    <h1>Captcha Form</h1>
    <form>
     <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Your Name:</label>
        <input placeholder="Enter your name" id="name" type="text" name="gaurav">
        <br>
        <br>
        <label for="username">Username: <span style="color: red;">*</span></label>
        <input type="text" placeholder="Enter user name:" name="username" id="username" >
        <br>
        <br>
        <label for="email">Email: <span style="color: red;">*</span></label>
        <input type="email" id="email" placeholder="Enter your email" name="email" >
        <br>
        <br>
        <label for="password">Password: <span style="color: red;">*</span></label>
        <input type="password" id="password" placeholder="Enter your password" name="password" >
        <br>
        <br>
        <input type="submit">
        &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;
        <input type="reset" value=" cancel">
        </fieldset>
        <br>
        <br>
        <fieldset>
            <legend>Additional Information</legend>
        <br>
        <label for="age">Age:</label>
        <input type="number" placeholder="Enter your age" name="age" id="age" min="1" max="100">
        <br>
        <br>
        <label for="date">Date:</label>
        <input type="date" id="date" name="date">
        <br>
        <br>
        <label for="time">Time:</label>
        <input type="time" id="time" name="time">
        <br>
        <br>
        <label for="url">Website:</label>
        <input type="url" id="url" name="url" placeholder="Enter website URL">
        <br>
        <br>
        <label for="datetime-local">Date and Time:</label>
        <input type="datetime-local" id="datetime-local" name="datetime-local">
        <br>
        <br>
        <label for="color">Color:</label>
        <input type="color" id="color" name="color">
        <br>
        <br>
        label for="file">Upload File:</label>
        <input type="file" id="file" name="file">
        <br>
        <br>
        <label for="week">Week:</label>
        <input type="week" id="week" name="week">
        <br>
        <br>

        <label for="submit">Other:</label>
        <input type="image" src="submit-button.png" id="submit">
        <br>
        <br>
        <label for="search">Search:</label>
        <input type="search" id="search" name="search" placeholder="Search...">
        <br>    
        <br>

        <label for="range">rating:</label>
        <input type="range" id="range" name="range" min="2" max="10">
        <button type="button">Click Me</button>
        <br>
        <br>
</fieldset>


<br>
<br>
<fieldset>
        <legend>Terms and Conditions</legend>
    <br>
        <label> <input type="checkbox" id="terms1" name="terms1"> I agree to the terms and conditions</label>
        <br>
        <label> <input type="checkbox" id="terms2" name="terms2"> I don't agree to the terms and conditions</label>
        <br>
        <label> <input type="checkbox" id="terms3" name="terms3"> I partially agree to the terms and conditions</label>
        <br>
        <br>

        <label>Gender:</label>
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="female">

        <label>Not allowd:</label>
        <input type="hidden" placeholder="you are not allowed">
        <br>
        <br>
        <br>
        <br>
 <label for="tech">Choose a technology:</label>
        <select name="tech" id="tech" multiple>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="javascript">JavaScript</option>
        </select>
        <br>
        <br>
        <br>
<label for="textarea">Comments:</label>
        <textarea name="comments" id="textarea" placeholder="Enter comments.... " rows="4" cols="30"></textarea>
        <br>
        <br>
        </fieldset>
    </form>
    
</body>

</html>
