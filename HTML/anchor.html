<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Tag</title>
</head>

<body>
    <h1>navigate to particular site</h1>
    <a href="https://www.google.com" title="google" target="_blank">Visit Google</a>
    <br>
    <a href="https://www.facebook.com" title="facebook" target="_self">Visit Facebook</a>
    <br>
    <a href="https://www.netflix.com" title="netflix" target="_blank">Visit Netflix</a>
    <br>
    <a href="https://www.twitter.com" title="twitter" target="_parent">Visit Twitter</a>

    <!-- anchor tag is used to create hyperlinks  and navigate between pages -->
    <!-- # used to navigate within the same page only -->
    <!-- title attribute provides additional information about the link qne displayed when the user hovers over it -->
    <br>
    <br>
    <a href="https://www.youtube.com/watch?v=TcMeyR-2y_k&list=RDTcMeyR-2y_k&start_radio=1" title="Songs"
        target="_blank">Visit YouTube</a>

    <br>
    <a href="../index.html" title="Home" target="_blank">NewsPaper</a>

</body>

</html>
