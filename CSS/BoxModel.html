<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        div{
            width: 300px;
            height: 300px;
            background-color: lightblue;
            border: 10px solid black;
            padding: 20px;
            margin: 30px;
        }
   
        .p1{
            width: 60px;
            height: 60px;
            background-color: red;
            border: 3px solid black;
            margin: 10px;
            padding: 20px;
        }
        .p2{
            width: 60px;
            height: 60px;
            background-color: green;
            border: 3px solid black;
            margin: 10px;
        }
        .p3{
            width: 60px;
            height: 60px;
            background-color: blue;
            border: 3px solid black;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div>
        <p class="p1">lorem12</p>
        <p class="p2">lorem12</p>
        <p class="p3">lorem12</p>
    </div>
</body>
</html>
